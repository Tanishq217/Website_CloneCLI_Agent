<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Untitled</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap');
        :root {
            --primary-color: #212121;
            --secondary-color: #3498db;
            --background-color: #f9f9f9;
            --dark-background-color: #1a1a1a;
        }
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Inter', sans-serif;
            line-height: 1.6;
            color: var(--primary-color);
            background-color: var(--background-color);
        }
        header {
            position: sticky;
            top: 0;
            background-color: var(--background-color);
            padding: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #ddd;
        }
        header nav {
            display: flex;
            justify-content: flex-end;
        }
        header nav a {
            margin-left: 20px;
            text-decoration: none;
            color: var(--primary-color);
            transition: color 0.2s ease;
        }
        header nav a:hover {
            color: var(--secondary-color);
        }
        .hero {
            background: linear-gradient(45deg, #3498db, #2ecc71);
            color: #fff;
            padding: 5rem;
            text-align: center;
        }
        .hero h1 {
            font-weight: 700;
            font-size: 2.5rem;
            margin-bottom: 1rem;
        }
        .hero p {
            font-size: 1.2rem;
            margin-bottom: 2rem;
        }
        .hero button {
            background-color: var(--primary-color);
            color: #fff;
            border: none;
            padding: 1rem 2rem;
            font-size: 1rem;
            cursor: pointer;
            transition: background-color 0.2s ease;
        }
        .hero button:hover {
            background-color: var(--secondary-color);
        }
        .courses {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            padding: 5rem;
        }
        .course {
            background-color: #fff;
            padding: 2rem;
            border: 1px solid #ddd;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        .course h2 {
            font-weight: 700;
            font-size: 1.5rem;
            margin-bottom: 1rem;
        }
        footer {
            background-color: var(--dark-background-color);
            color: #fff;
            padding: 2rem;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
        }
        footer a {
            text-decoration: none;
            color: #fff;
            transition: color 0.2s ease;
        }
        footer a:hover {
            color: var(--secondary-color);
        }
        @media (max-width: 768px) {
            .hero {
                padding: 2rem;
            }
            .courses {
                grid-template-columns: repeat(2, 1fr);
                padding: 2rem;
            }
            footer {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
    <header>
        <span>Untitled</span>
        <nav>
            <a href="#">Home</a>
            <a href="#">About</a>
            <a href="#">Contact</a>
        </nav>
    </header>
    <section class="hero">
        <h1>Untitled</h1>
        <p>This is a hero section.</p>
        <button>Learn More</button>
        <button>Get Started</button>
    </section>
    <section class="courses">
        <div class="course">
            <h2>Course 1</h2>
            <p>This is a course description.</p>
        </div>
        <div class="course">
            <h2>Course 2</h2>
            <p>This is a course description.</p>
        </div>
        <div class="course">
            <h2>Course 3</h2>
            <p>This is a course description.</p>
        </div>
    </section>
    <footer>
        <div>
            <h2>Untitled</h2>
            <a href="#">Home</a>
            <a href="#">About</a>
        </div>
        <div>
            <h2>Links</h2>
            <a href="#">Link 1</a>
            <a href="#">Link 2</a>
        </div>
        <div>
            <h2>Contact</h2>
            <a href="#">Email</a>
            <a href="#">Phone</a>
        </div>
        <div>
            <h2>Copyright</h2>
            <p>&copy; 2023 Untitled</p>
        </div>
    </footer>
</body>
</html>
